# Exemplo fictício — sem dados pessoais reais.
# Caso de teste: 1 falecido, com meeiro (comunhão parcial), 2 herdeiros, 2 bens.

tipo_ato: inventario_extrajudicial
possui_meeiro: true
percentual_meacao: 50
patrimonio_total: 1000000.00

herdeiros:
  - id: HERDEIRO_1
    percentual_heranca: 50
  - id: HERDEIRO_2
    percentual_heranca: 50

bens:
  - id: IMOVEL_1
    tipo: imovel
    descricao_generica: "Imóvel urbano objeto da matrícula [MATRICULA]"
    valor: 600000.00
    distribuicao:
      - beneficiario: MEEIRO
        percentual: 50
      - beneficiario: HERDEIRO_1
        percentual: 25
      - beneficiario: HERDEIRO_2
        percentual: 25

  - id: SALDO_1
    tipo: dinheiro
    descricao_generica: "Saldo bancário em instituição financeira [BANCO]"
    valor: 400000.00
    distribuicao:
      - beneficiario: MEEIRO
        percentual: 50
      - beneficiario: HERDEIRO_1
        percentual: 25
      - beneficiario: HERDEIRO_2
        percentual: 25
